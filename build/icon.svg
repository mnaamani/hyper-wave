<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b160e"/>
      <stop offset="1" stop-color="#0b0a09"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB347"/>
      <stop offset="0.5" stop-color="#F7931A"/>
      <stop offset="1" stop-color="#E87A00"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="8" y="8" width="1008" height="1008" rx="222" fill="none"
        stroke="#F7931A" stroke-opacity="0.12" stroke-width="4"/>
  <g filter="url(#glow)" fill="none" stroke="url(#orange)"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- echo wave (dim) -->
    <path d="M150 600 Q341 400 512 600 Q683 800 874 600"
          stroke-width="40" stroke-opacity="0.28"/>
    <!-- main wave -->
    <path d="M150 470 Q341 250 512 470 Q683 690 874 470"
          stroke-width="92"/>
  </g>
</svg>
