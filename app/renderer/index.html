<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HyperWave</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 20%, #0e4f15 0%, #041007 100%);
        color: #eafff0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin: 16px 0 4px;
      }
      h1 {
        font-size: 26px;
        margin: 0;
        letter-spacing: 1px;
      }
      #v {
        opacity: 0.6;
        font-size: 13px;
      }
      #status {
        font-size: 14px;
        opacity: 0.85;
        min-height: 20px;
      }
      #me {
        font-size: 12px;
        opacity: 0.6;
        font-family: ui-monospace, Menlo, monospace;
      }
      /* the field: canvas ring with a centred overlay (kick-off / countdown) */
      .field {
        position: relative;
        width: 440px;
        height: 440px;
        margin-top: 8px;
      }
      #ring {
        display: block;
      }
      #center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: none; /* let ring clicks through; children re-enable */
      }
      #center > * {
        pointer-events: auto;
      }
      #start {
        padding: 12px 24px;
        font-size: 17px;
        border: 2px solid #ffd166;
        border-radius: 26px;
        background: rgba(6, 33, 13, 0.6);
        color: #ffd166;
        cursor: pointer;
      }
      #start:hover {
        background: #ffd166;
        color: #06210d;
      }
      #lobby {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      #lobby.show {
        display: flex;
      }
      #lobby-count {
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        color: #ffd166;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      }
      #lobby-msg {
        font-size: 15px;
        font-weight: 600;
      }
      #join {
        margin-top: 6px;
        padding: 9px 22px;
        font-size: 15px;
        border: none;
        border-radius: 20px;
        background: #39d98a;
        color: #06210d;
        font-weight: 600;
        cursor: pointer;
      }
      /* proof window: circular selfie capture in the centre of the ring */
      #proof {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #proof.show {
        display: flex;
      }
      #proof-wrap {
        position: relative;
        width: 200px;
        height: 200px;
      }
      #preview {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;
        transform: scaleX(-1);
        background: #04140a;
        border: 3px solid #ffd166;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
      }
      #countdown {
        position: absolute;
        top: 6px;
        right: 6px;
        min-width: 22px;
        height: 22px;
        padding: 0 6px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.65);
        color: #ffd166;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #countdown:empty {
        display: none;
      }
      #caption {
        width: 220px;
        box-sizing: border-box;
        padding: 6px 10px;
        font-size: 13px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.4);
        color: #eafff0;
        text-align: center;
      }
      #proof-btns {
        display: flex;
        gap: 8px;
      }
      #proof-btns button {
        padding: 8px 18px;
        font-size: 14px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
      }
      #capture {
        background: #ffd166;
        color: #06210d;
        font-weight: 600;
      }
      #skip {
        background: rgba(0, 0, 0, 0.4);
        color: #eafff0;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🌊 HyperWave</h1>
      <span id="v">v</span>
    </header>
    <div id="status">connecting…</div>
    <div id="me"></div>
    <div class="field">
      <canvas id="ring" width="440" height="440"></canvas>
      <div id="center">
        <button id="start">⚽ Kick off the wave</button>
        <div id="lobby">
          <div id="lobby-count"></div>
          <div id="lobby-msg">🌊 a wave is forming</div>
          <button id="join">✋ Count me in</button>
        </div>
        <div id="proof">
          <div id="proof-wrap">
            <video id="preview" autoplay muted playsinline></video>
            <div id="countdown"></div>
          </div>
          <input id="caption" placeholder="Say something… 🇧🇷" maxlength="60" />
          <div id="proof-btns">
            <button id="capture">📸 Capture</button>
            <button id="skip">Skip</button>
          </div>
        </div>
      </div>
    </div>

    <canvas id="snap" width="240" height="180" style="display: none"></canvas>
    <script type="module" src="app.js"></script>
  </body>
</html>
