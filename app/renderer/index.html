<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HyperWave</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 20%, #0e4f15 0%, #041007 100%);
        color: #eafff0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin: 16px 0 4px;
      }
      h1 {
        font-size: 26px;
        margin: 0;
        letter-spacing: 1px;
      }
      #v {
        opacity: 0.6;
        font-size: 13px;
      }
      #status {
        font-size: 14px;
        opacity: 0.85;
        min-height: 20px;
      }
      #me {
        font-size: 12px;
        opacity: 0.6;
        font-family: ui-monospace, Menlo, monospace;
      }
      #start {
        margin-top: 14px;
        padding: 10px 22px;
        font-size: 16px;
        border: 2px solid #ffd166;
        border-radius: 24px;
        background: transparent;
        color: #ffd166;
        cursor: pointer;
      }
      #start:hover:not(:disabled) {
        background: #ffd166;
        color: #06210d;
      }
      #start:disabled {
        opacity: 0.4;
        cursor: default;
      }
      /* proof window modal */
      /* compact corner card — must NOT cover the ring / rolling ball */
      #modal {
        display: none;
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 10;
      }
      #modal.show {
        display: block;
      }
      .sheet {
        background: rgba(11, 42, 18, 0.96);
        border: 2px solid #ffd166;
        border-radius: 14px;
        padding: 12px;
        width: 210px;
        text-align: center;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
      }
      .sheet h2 {
        margin: 0 0 2px;
        font-size: 15px;
      }
      .sheet .sub {
        opacity: 0.7;
        font-size: 11px;
        margin-bottom: 8px;
      }
      #preview {
        width: 186px;
        height: 140px;
        object-fit: cover;
        border-radius: 10px;
        background: #04140a;
        transform: scaleX(-1);
      }
      #countdown {
        font-size: 30px;
        font-weight: 700;
        color: #ffd166;
        height: 36px;
      }
      #caption {
        width: 100%;
        box-sizing: border-box;
        margin: 8px 0;
        padding: 6px 8px;
        font-size: 13px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.3);
        color: #eafff0;
      }
      .sheet button {
        padding: 7px 14px;
        font-size: 13px;
        border-radius: 18px;
        border: none;
        cursor: pointer;
        margin: 0 3px;
      }
      #capture {
        background: #ffd166;
        color: #06210d;
        font-weight: 600;
      }
      #skip {
        background: transparent;
        color: #eafff0;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🌊 HyperWave</h1>
      <span id="v">v</span>
    </header>
    <div id="status">connecting…</div>
    <div id="me"></div>
    <canvas id="ring" width="440" height="440"></canvas>
    <button id="start">⚽ Kick off the wave</button>

    <div id="modal">
      <div class="sheet">
        <h2>🌊 The wave passed you!</h2>
        <div class="sub" id="modal-sub">Strike a pose — you're in the chain.</div>
        <video id="preview" autoplay muted playsinline></video>
        <div id="countdown"></div>
        <input id="caption" placeholder="Say something… 🇧🇷" maxlength="60" />
        <div>
          <button id="capture">📸 Capture</button>
          <button id="skip">Skip</button>
        </div>
      </div>
    </div>

    <canvas id="snap" width="240" height="180" style="display: none"></canvas>
    <script type="module" src="app.js"></script>
  </body>
</html>
