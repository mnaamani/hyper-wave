name: Build Release

# Build the distributable INSTALLERS on native runners (installer makers are OS-bound):
#   Linux (AppImage/Snap/Flatpak, x64 + arm64) via holepunch's make-pear-app;
#   macOS (dmg, arm64 + x64) + Windows (MSIX) via forge directly, UNSIGNED — make-pear-app always
#   runs its cert-import step and can't build unsigned, whereas forge skips signing when its env
#   vars are unset (forge.config.js). To SIGN mac/win: add the secrets below and switch those jobs
#   back to make-pear-app. Each job also uploads its raw app in the pear-runtime OTA layout as an
#   `ota-<platform-arch>` artifact, plus its installer.
#
# SEEDING IS NOT DONE HERE. A Hyperdrive is single-writer and CI storage is ephemeral, so the OTA
# update is staged + seeded by an ALWAYS-ON HOST that downloads these artifacts (`scripts/seed.mjs`)
# — see RELEASE.md. Runs on a version tag push (v*) or manual dispatch.
#
# Signing secrets (only used once mac/win are switched back to make-pear-app):
#   macOS:   CERTIFICATE_P12, CERTIFICATE_PASSWORD, MAC_CODESIGN_IDENTITY, APPLE_ID,
#            APPLE_PASSWORD, APPLE_TEAM_ID
#   Windows: WINDOWS_CERT_PFX_BASE64, WINDOWS_CERT_PASSWORD
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upgrade-key:
        description: 'Value for package.json upgrade field (optional)'
        required: false

env:
  CHANNEL: production

jobs:
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package-name: ${{ steps.meta.outputs.package_name }}
      package-name-lower: ${{ steps.meta.outputs.package_name_lower }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Prepare build metadata
        id: meta
        run: |
          name=$(jq -r '.name' package.json)
          product_name=$(jq -r '.productName // empty' package.json)
          package_name="${product_name:-$name}"
          package_name_lower=$(printf '%s' "$package_name" | tr '[:upper:]' '[:lower:]')
          {
            echo "package_name=$package_name"
            echo "package_name_lower=$package_name_lower"
            echo "version=$(jq -r '.version' package.json)"
          } >> "$GITHUB_OUTPUT"

  build-linux-x64:
    needs: [prebuild]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: holepunchto/actions/make-pear-app@v1
        with:
          channel: ${{ env.CHANNEL }}
          upgrade_key: ${{ inputs['upgrade-key'] }}
          linux_appimage: >-
            ${{ format('{0}-{1}-{2}.AppImage',
                needs.prebuild.outputs.package-name,
                needs.prebuild.outputs.version, 'x64') }}
          linux_snap: >-
            ${{ format('{0}_{1}_{2}.snap',
                needs.prebuild.outputs.package-name-lower,
                needs.prebuild.outputs.version, 'amd64') }}
          linux_flatpak: >-
            ${{ format('{0}_{1}_{2}_flatpak.tar.gz',
                needs.prebuild.outputs.package-name-lower,
                needs.prebuild.outputs.version, 'x64') }}
      - name: Assemble + upload this platform's OTA payload
        uses: ./.github/actions/ota-payload

  build-linux-arm:
    needs: [prebuild]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04-arm
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: holepunchto/actions/make-pear-app@v1
        with:
          channel: ${{ env.CHANNEL }}
          upgrade_key: ${{ inputs['upgrade-key'] }}
          linux_appimage: >-
            ${{ format('{0}-{1}-{2}.AppImage',
                needs.prebuild.outputs.package-name,
                needs.prebuild.outputs.version, 'arm64') }}
          linux_snap: >-
            ${{ format('{0}_{1}_{2}.snap',
                needs.prebuild.outputs.package-name-lower,
                needs.prebuild.outputs.version, 'arm64') }}
          linux_flatpak: >-
            ${{ format('{0}_{1}_{2}_flatpak.tar.gz',
                needs.prebuild.outputs.package-name-lower,
                needs.prebuild.outputs.version, 'arm64') }}
      - name: Assemble + upload this platform's OTA payload
        uses: ./.github/actions/ota-payload

  # macOS/Windows build UNSIGNED via forge directly — make-pear-app always runs its
  # setup-certificates step and fails without a cert, so it can't do unsigned mac/win. forge skips
  # signing when its env vars are unset (forge.config.js), so this produces unsigned installers +
  # the OTA payload. Add the signing secrets + switch these back to make-pear-app to sign.
  build-macos:
    needs: [prebuild]
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build (unsigned) + OTA payload
        run: |
          npm ci
          npm run make
      - name: Assemble + upload this platform's OTA payload
        uses: ./.github/actions/ota-payload
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-arm64
          path: out/make/**
          if-no-files-found: warn

  build-macos-x64:
    needs: [prebuild]
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build (unsigned) + OTA payload
        run: |
          npm ci
          npm run make
      - name: Assemble + upload this platform's OTA payload
        uses: ./.github/actions/ota-payload
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-x64
          path: out/make/**
          if-no-files-found: warn

  build-win32:
    needs: [prebuild]
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build (unsigned) + OTA payload
        run: |
          npm ci
          npm run make
      - name: Assemble + upload this platform's OTA payload
        uses: ./.github/actions/ota-payload
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-win32
          path: out/make/**
          if-no-files-found: warn
