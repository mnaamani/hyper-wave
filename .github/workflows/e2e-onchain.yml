name: On-chain E2E (Nile testnet)

# Real external-testnet integration test: enforced wave with real fee burns on
# Tron Nile. It needs FUNDED wallet mnemonics (repo secrets) and spends testnet TRX, so it does
# NOT run on every push — only on manual dispatch or a nightly schedule. If the secrets aren't
# configured, the test skips itself (harmless no-op).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # nightly, 04:00 UTC

jobs:
  onchain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      - name: Install dependencies
        run: npm ci

      # Wallets must stay funded (Nile faucet: https://nileex.io/join/getJoinPage):
      # burn a 1 TRX fee per run, so keep them funded.
      - name: On-chain e2e — native TRX (Tron Nile testnet)
        run: npm run test:e2e:onchain
        env:
          E2E_ONCHAIN: '1'
          HYPERWAVE_E2E_SEED_1: ${{ secrets.HYPERWAVE_E2E_SEED_1 }}
          HYPERWAVE_E2E_SEED_2: ${{ secrets.HYPERWAVE_E2E_SEED_2 }}

      # USDT (TRC-20) lane — same seeds/addresses, but they must also hold USDT for fees (TRX still
      # pays gas). Skips itself if HYPERWAVE_E2E_USDT_CONTRACT is unset. `if: always()` so it runs
      # even if the TRX lane above failed (independent payment mechanisms).
      - name: On-chain e2e — USDT / TRC-20 (Tron Nile testnet)
        if: always()
        run: npm run test:e2e:onchain:usdt
        env:
          E2E_ONCHAIN_USDT: '1'
          HYPERWAVE_E2E_USDT_CONTRACT: ${{ secrets.HYPERWAVE_E2E_USDT_CONTRACT }}
          HYPERWAVE_E2E_SEED_1: ${{ secrets.HYPERWAVE_E2E_SEED_1 }}
          HYPERWAVE_E2E_SEED_2: ${{ secrets.HYPERWAVE_E2E_SEED_2 }}
