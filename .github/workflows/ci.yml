name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      # `bare` is the worker's real runtime; unit + e2e tests both drive it.
      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      # workspace install from the repo root (hoists deps; runs the fix-bare-engines postinstall)
      - name: Install dependencies
        run: npm ci

      - name: Lint + format check
        run: npm run lint

      - name: Unit tests (brittle, under Bare)
        run: npm test

      # Real end-to-end: spawns a local DHT + N bare peers and drives full waves. No wallets /
      # no on-chain, so it's deterministic and secret-free. (The paid-wave on-chain suite runs
      # separately — it needs funded testnet wallets as secrets and is gated to manual/nightly.)
      #
      # NON-BLOCKING (continue-on-error) on purpose. This test needs N peers to DISCOVER each other
      # over a real Hyperswarm DHT, which is UDP. A GitHub runner is a small, containerised box with
      # constrained/lossy loopback UDP, so DHT discovery is flaky there — the peer count each node
      # finds swings run to run (seen: peers=2..5 of 5, wildly variable), and when discovery falls
      # short the wave never starts (150s timeout). That's an infrastructure limit, not a protocol
      # bug: the same code discovers + converges on a healthy machine. So we run it for SIGNAL but
      # don't fail the build on it — the network-free unit suite above is the real gate. It stays a
      # blocking gate locally / on a self-hosted or beefier runner where UDP works; bump E2E_PEERS
      # back toward 8 there. (5 is a gentler load for the shared runner when it does get to run.)
      - name: Local end-to-end tests (informational; flaky DHT/UDP on shared runners)
        continue-on-error: true
        run: npm run test:e2e:local
        env:
          E2E_PEERS: 5
