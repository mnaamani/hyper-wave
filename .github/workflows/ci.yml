name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      # `bare` is the worker's real runtime; unit + e2e tests both drive it.
      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      # workspace install from the repo root (hoists deps; runs the fix-bare-engines postinstall)
      - name: Install dependencies
        run: npm ci

      - name: Lint + format check
        run: npm run lint

      - name: Unit tests (brittle, under Bare)
        run: npm test

      # Real end-to-end: spawns a local DHT + N bare peers and drives full waves. No wallets /
      # no on-chain, so it's deterministic and secret-free. (The paid-wave on-chain suite runs
      # separately — it needs funded testnet wallets as secrets and is gated to manual/nightly.)
      #
      # E2E_PEERS is 5, not 8: a GitHub runner is a small, containerised box with constrained
      # loopback UDP, and the local DHT couldn't reliably get all 8 peers to DISCOVER each other
      # there (seen as `peers=5 connected=5` — 3 peers never found, so the wave never started).
      # Fewer peers = fewer UDP flows = reliable discovery, and 5 still exercises the full ring,
      # token race, gallery convergence, and healing (kill 2 -> 3 survivors). Bump it back up for a
      # beefier runner; the protocol handles 8 fine where the network does.
      - name: Local end-to-end tests
        run: npm run test:e2e:local
        env:
          E2E_PEERS: 5
