name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      # `bare` is the worker's real runtime; unit + e2e tests both drive it.
      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      # workspace install from the repo root (hoists deps; runs the fix-bare-engines postinstall)
      - name: Install dependencies
        run: npm ci

      - name: Lint + format check
        run: npm run lint

      - name: Unit tests (brittle, under Bare)
        run: npm test

      # Real end-to-end over the LOCAL DHT (@hyperswarm/testnet): offline, deterministic, exercises
      # the loopback path. This is the per-push e2e gate. No wallets / no on-chain (the paid-wave
      # on-chain suite runs separately, gated to manual/nightly).
      #
      # The PUBLIC-DHT run (E2E_PUBLIC=1 — real discovery, NAT/holepunch) is NOT run here: on a
      # single-IP CI runner, repeated cold full-roster discovery is too slow/nondeterministic to be
      # a reliable per-push gate (timeout-bumping and retries couldn't stabilize it). It lives in
      # the manual `e2e-public.yml` workflow instead — dispatch it for real-network validation.
      #
      # (Historical note: local-only red = testnet/loopback networking — July 2026: hyperdht 6.33.0
      # silently regressed exactly that; pinned to 6.32.0 in root package.json overrides, see
      # TODO.md "Dependency watch".)
      - name: End-to-end tests (local DHT)
        run: npm run test:e2e:local
        env:
          E2E_PEERS: 8
