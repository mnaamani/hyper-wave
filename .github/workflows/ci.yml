name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Headroom for the public-DHT e2e tier, which runs with a 2x time budget (E2E_WAIT_SCALE
    # below) to absorb real-network discovery/replication latency on a single-IP runner.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      # `bare` is the worker's real runtime; unit + e2e tests both drive it.
      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      # workspace install from the repo root (hoists deps; runs the fix-bare-engines postinstall)
      - name: Install dependencies
        run: npm ci

      - name: Lint + format check
        run: npm run lint

      - name: Unit tests (brittle, under Bare)
        run: npm test

      # Real end-to-end, run TWICE — once per network scenario — so a regression in either layer
      # is caught and localized in one CI run. No wallets / no on-chain in either mode (the
      # paid-wave on-chain suite runs separately: funded-wallet secrets, gated to manual/nightly).
      #
      #  1. Local DHT (@hyperswarm/testnet): offline, deterministic, exercises the loopback path.
      #  2. Public DHT (E2E_PUBLIC=1): the production path — real discovery, NAT/holepunch code,
      #     isolated by a random per-run match topic; needs outbound UDP from the runner.
      #
      # Comparing the two localizes a failure instantly: local-only red = testnet/loopback
      # networking (July 2026: hyperdht 6.33.0 silently regressed exactly that — flaky
      # announce/lookup + silently-dying connections; pinned to 6.32.0 in root package.json
      # overrides, see TODO.md "Dependency watch" and issue.md); public-only red = runner
      # UDP/internet or real-DHT trouble; both red = suspect the protocol itself.
      - name: End-to-end tests (local DHT)
        run: npm run test:e2e:local
        env:
          E2E_PEERS: 8

      - name: End-to-end tests (public DHT)
        run: npm run test:e2e:local
        env:
          E2E_PUBLIC: 1
          E2E_PEERS: 8
          E2E_WAIT_SCALE: 2 # public DHT is slower than the local testnet — double the budgets
