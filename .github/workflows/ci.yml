name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json # single source of truth (volta.node / engines)

      # `bare` is the worker's real runtime; unit + e2e tests both drive it.
      - name: Install the Bare runtime
        run: npm install -g bare-runtime

      # workspace install from the repo root (hoists deps; runs the fix-bare-engines postinstall)
      - name: Install dependencies
        run: npm ci

      - name: Lint + format check
        run: npm run lint

      - name: Unit tests (brittle, under Bare)
        run: npm test

      # Real end-to-end: N bare peers drive full waves over the PUBLIC Hyperswarm DHT, isolated by
      # a random per-run match topic. No wallets / no on-chain, so it's secret-free. (The paid-wave
      # on-chain suite runs separately — it needs funded testnet wallets and is gated to
      # manual/nightly.)
      #
      # E2E_PUBLIC=1 (public DHT), NOT the local @hyperswarm/testnet bootstrap: the 3-node loopback
      # testnet proved to be its own failure mode — flaky announce/lookup at startup and fragile
      # (silently dead) peer connections — failing runs on machines where the SAME code over the
      # public DHT passes fast and clean (8-peer convergence in ~22s, healing in ~37s). The public
      # DHT exercises the production path; the testnet mode remains available locally (just unset
      # E2E_PUBLIC) for offline work.
      #
      # Still NON-BLOCKING (continue-on-error) until public-DHT mode proves reliable on shared
      # runners over a stretch of CI runs — it needs outbound UDP from the runner. The network-free
      # unit suite above is the blocking gate. If this stays green, drop continue-on-error.
      - name: End-to-end tests (public DHT; informational until proven on runners)
        continue-on-error: true
        run: npm run test:e2e:local
        env:
          E2E_PUBLIC: 1
          E2E_PEERS: 5
